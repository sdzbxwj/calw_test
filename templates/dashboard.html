<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calw_test - 控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .welcome {
            font-size: 24px;
            color: #667eea;
            margin: 20px 0;
        }

        .card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .card p {
            margin: 8px 0;
            color: #555;
        }

        .btn-logout {
            display: inline-block;
            padding: 12px 40px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 登录成功</h1>
        <div class="welcome">欢迎，{{ name }}！</div>

        <div class="card">
            <p><strong>用户名：</strong>{{ username }}</p>
            <p><strong>状态：</strong>已登录</p>
            <p><strong>时间：</strong>{{ now }}</p>
        </div>

        <a href="{{ url_for('logout') }}" class="btn-logout">退出登录</a>
    </div>
</body>

</html>
